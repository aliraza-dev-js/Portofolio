<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ali Raza Portfolio</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #0a0a0a;
  color: #fff;
  overflow-x: hidden;
}

header {
  background: linear-gradient(135deg, #0a0a0a, #1a001a);
  color: #0ff;
  padding: 30px 20px;
  text-align: center;
  box-shadow: 0 0 30px #ff00ff, 0 0 60px #00ffff;
  animation: glow 3s ease-in-out infinite;
}

@keyframes glow {
 0%, 100% { box-shadow: 0 0 20px #ff00ff, 0 0 40px #00ffff; }
 50% { box-shadow: 0 0 40px #ff00ff, 0 0 80px #00ffff; }
}

header h1 {
  font-size: 2.5em;
  text-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
  animation: fadeInDown 1s ease;
}

header p {
  margin-top: 10px;
  color: #ff00ff;
  text-shadow: 0 0 10px #ff00ff;
  animation: fadeInUp 1s ease 0.3s both;
}

@keyframes fadeInDown {
  from { opacity: 0; transform: translateY(-30px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

.container {
  padding: 20px;
  max-width: 900px;
  margin: auto;
}

nav {
  text-align: center;
  margin: 30px 0;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
}

nav button {
  padding: 12px 25px;
  border: 2px solid #00ffff;
  background: transparent;
  color: #00ffff;
  cursor: pointer;
  border-radius: 50px;
  font-weight: bold;
  font-size: 1em;
  transition: all 0.3s ease;
  box-shadow: 0 0 10px #00ffff;
  position: relative;
  overflow: hidden;
}

nav button::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, #00ffff, transparent);
  transition: 0.5s;
}

nav button:hover::before {
  left: 100%;
}

nav button:hover {
  background: #00ffff;
  color: #000;
  box-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff;
  transform: translateY(-3px);
}

nav button.active {
  background: #ff00ff;
  border-color: #ff00ff;
  color: #fff;
  box-shadow: 0 0 20px #ff00ff, 0 0 40px #ff00ff;
}

.section {
  display: none;
  padding: 30px;
  background: rgba(17, 17, 17, 0.8);
  border-radius: 15px;
  border: 1px solid #ff00ff;
  box-shadow: 0 0 20px rgba(255, 0, 255, 0.5);
  animation: slideIn 0.5s ease;
}

.section.active {
  display: block;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateX(-20px); }
  to { opacity: 1; transform: translateX(0); }
}

h2 {
  color: #00ffff;
  text-shadow: 0 0 10px #00ffff;
  margin-bottom: 20px;
}

input, button {
  padding: 12px;
  margin: 5px;
  border-radius: 8px;
  border: 1px solid #00ffff;
  background: #1a1a1a;
  color: #fff;
  font-size: 1em;
  outline: none;
  transition: 0.3s;
}

input:focus {
  box-shadow: 0 0 15px #00ffff;
  border-color: #ff00ff;
}

button {
  background: #ff00ff;
  color: #fff;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  background: #00ffff;
  color: #000;
  box-shadow: 0 0 15px #00ffff;
  transform: scale(1.05);
}

#todo-list {
  list-style: none;
  margin-top: 15px;
}

#todo-list li {
  background: #1a1a1a;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border-left: 3px solid #ff00ff;
  display: flex;
  justify-content: space-between;
  align-items: center;
  animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

#todo-list li button {
  background: #ff0040;
  padding: 5px 10px;
  font-size: 0.8em;
}

.calculator {
  max-width: 320px;
  margin: 20px auto;
  background: #0f0f0f;
  padding: 20px;
  border-radius: 15px;
  border: 2px solid #00ffff;
  box-shadow: 0 0 30px #00ffff;
}

.calculator input {
  width: 100%;
  height: 60px;
  text-align: right;
  font-size: 28px;
  background: #000;
  color: #0ff;
  border: 1px solid #00ffff;
  margin-bottom: 15px;
}

.calculator .buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

.calculator button {
  height: 60px;
  font-size: 20px;
  background: #1a1a1a;
  border: 1px solid #333;
}

.calculator button:hover {
  background: #00ffff;
  box-shadow: 0 0 15px #00ffff;
}

.calculator button.equal {
  background: #00ff00;
  color: #000;
  grid-column: span 2;
}

.calculator button.equal:hover {
  background: #00ff00;
  box-shadow: 0 0 20px #00ff00;
}

hr {
  border: none;
  height: 1px;
  background: linear-gradient(90deg, transparent, #ff00ff, transparent);
  margin: 25px 0;
}

/* Mobile Responsive */
@media (max-width: 600px) {
  header h1 {
    font-size: 1.8em;
  }
  
  nav button {
    padding: 10px 18px;
    font-size: 0.9em;
    flex: 1 1 auto;
    min-width: 100px;
  }
  
  .section {
    padding: 20px 15px;
  }
  
  input, button {
    width: 100%;
    margin: 8px 0;
  }
  
  #todo-input, #dict-input {
    width: 100%;
  }
  
  .calculator {
    max-width: 100%;
  }
  
  .calculator .buttons {
    gap: 8px;
  }
  
  .calculator button {
    height: 55px;
    font-size: 18px;
  }
}
</style>
</head>
<body>
<header>
  <h1>Ali Raza</h1>
  <p>Frontend Developer | JavaScript Enthusiast</p>
</header>

<div class="container">
  <nav>
    <button onclick="showSection('about')" class="active">About Me</button>
    <button onclick="showSection('todo')">To-Do App</button>
    <button onclick="showSection('calc')">Calculator</button>
  </nav>

  <section id="about" class="section active">
    <h2>About Me</h2>
    <p style="text-align:center; line-height:1.6;">
      Passionate frontend developer learning JavaScript and building cool projects. 
      I create interactive web apps with neon vibes and smooth animations.
    </p>
  </section>

  <section id="todo" class="section">
    <h2>To-Do List App</h2>
    <div class="todo-app">
      <input type="text" id="todo-input" placeholder="Add a task...">
      <button id="add-btn">Add Task</button>
      <ul id="todo-list"></ul>
      
      <hr>
      
      <h3 style="color:#ff00ff;">Dictionary</h3>
      <input type="text" id="dict-input" placeholder="Word likho meaning ke liye">
      <button onclick="getMeaning()">Explain</button>
      <p id="meaning-box" style="margin-top:15px; color:#00ffff;"></p>
    </div>
  </section>

  <section id="calc" class="section">
    <h2>Neon Calculator</h2>
    <div class="calculator">
      <input type="text" id="display" disabled>
      <div class="buttons">
        <button onclick="clearDisplay()">C</button>
        <button onclick="deleteLast()">⌫</button>
        <button onclick="append('/')">/</button>
        <button onclick="append('*')">*</button>
        
        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>
        <button onclick="append('-')">-</button>
        
        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>
        <button onclick="append('+')">+</button>
        
        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>
        <button onclick="append('.')">.</button>
        
        <button onclick="append('0')">0</button>
        <button class="equal" onclick="calculate()">=</button>
      </div>
    </div>
  </section>
</div>

<script>
function showSection(id){
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}

async function getMeaning() {
  let word = document.getElementById("dict-input").value;
  let box = document.getElementById("meaning-box");
  if(!word) return;
  
  box.innerText = "Searching...";
  try {
    let res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
    let data = await res.json();
    if(data.title){
      box.innerText = "Word nahi mila 😅";
    } else {
      let meaning = data[0].meanings[0].definitions[0].definition;
      box.innerText = `${word}: ${meaning}`;
    }
  } catch(e){
    box.innerText = "Error aa gaya";
  }
}

// To-Do App Logic
let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
const input = document.getElementById('todo-input');
const list = document.getElementById('todo-list');

function renderTasks(){
  list.innerHTML = '';
  tasks.forEach((task, i) => {
    list.innerHTML += `<li>${task} <button onclick="deleteTask(${i})">X</button></li>`;
  });
  localStorage.setItem('tasks', JSON.stringify(tasks));
}

document.getElementById('add-btn').onclick = () => {
  if(input.value.trim()){
    tasks.push(input.value.trim());
    input.value = '';
    renderTasks();
  }
};

function deleteTask(i){
  tasks.splice(i,1);
  renderTasks();
}

renderTasks();

// Calculator Logic
function append(val){
  document.getElementById('display').value += val;
}
function clearDisplay(){
  document.getElementById('display').value = '';
}
function deleteLast(){
  let val = document.getElementById('display').value;
  document.getElementById('display').value = val.slice(0,-1);
}
function calculate(){
  try{
    document.getElementById('display').value = eval(document.getElementById('display').value);
  } catch(e){
    document.getElementById('display').value = 'Error';
  }
}
</script>
</body>
</html>
