<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>
<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 0;
  background: #f4f4f4;
}
header {
  background: #333;
  color: #fff;
  padding: 20px;
  text-align: center;
}
.container {
  padding: 20px;
}
nav {
  text-align: center;
  margin: 20px 0;
}
nav button {
  margin: 5px;
  padding: 10px 20px;
  border: none;
  background: #333;
  color: #fff;
  cursor: pointer;
  border-radius: 5px;
}
nav button:hover {
  background: #555;
}
.section {
  display: none;
}
.section.active {
  display: block;
}
.calculator {
  max-width: 300px;
  margin: auto;
}
.calculator input {
  width: 100%;
  height: 50px;
  text-align: right;
  font-size: 24px;
}
.calculator button {
  width: 23%;
  height: 50px;
  margin: 1%;
  font-size: 18px;
}
</style>
</head>
<body>
<header>
  <h1>Ali Raza</h1>
  <p>Frontend Developer | JavaScript Enthusiast</p>
</header>

<div class="container">
  <nav>
    <button onclick="showSection('about')">About Me</button>
    <button onclick="showSection('todo')">To-Do App</button>
    <button onclick="showSection('calc')">Calculator</button>
  </nav>

  <section id="about" class="section active">
    <h2>About Me</h2>
    <p style="text-align:center;">Passionate frontend developer learning JavaScript and building cool projects. I create interactive web apps.</p>
  </section>

  <section id="todo" class="section">
    <h2>To-Do List App</h2>
    <div class="todo-app">
      <input type="text" id="todo-input" placeholder="Add a task...">
      <button id="add-btn">Add</button>
      <ul id="todo-list"></ul>
      
      <hr>
      
      <h3>Dictionary</h3>
      <input type="text" id="dict-input" placeholder="Word likho meaning ke liye">
      <button onclick="getMeaning()">Explain</button>
      <p id="meaning-box"></p>
    </div>
  </section>

  <section id="calc" class="section">
    <h2>Neon Calculator</h2>
    <div class="calculator">
      <input type="text" id="display" disabled>
      <div class="buttons">
        <button onclick="clearDisplay()">C</button>
        <button onclick="deleteLast()">⌫</button>
        <button onclick="append('/')">/</button>
        <button onclick="append('*')">*</button>
        
        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>
        <button onclick="append('-')">-</button>
        
        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>
        <button onclick="append('+')">+</button>
        
        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>
        <button onclick="append('.')">.</button>
        
        <button onclick="append('0')">0</button>
        <button class="equal" onclick="calculate()">=</button>
      </div>
    </div>
  </section>
</div>

<script>
function showSection(id){
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

async function getMeaning() {
  let word = document.getElementById("dict-input").value;
  let box = document.getElementById("meaning-box");
  if(!word) return;
  
  box.innerText = "Searching...";
  try {
    let res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
    let data = await res.json();
    if(data.title){
      box.innerText = "Word nahi mila 😅";
    } else {
      let meaning = data[0].meanings[0].definitions[0].definition;
      box.innerText = `${word}: ${meaning}`;
    }
  } catch(e){
    box.innerText = "Error aa gaya";
  }
}

// To-Do App Logic
let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
const input = document.getElementById('todo-input');
const list = document.getElementById('todo-list');

function renderTasks(){
  list.innerHTML = '';
  tasks.forEach((task, i) => {
    list.innerHTML += `<li>${task} <button onclick="deleteTask(${i})">X</button></li>`;
  });
  localStorage.setItem('tasks', JSON.stringify(tasks));
}

document.getElementById('add-btn').onclick = () => {
  if(input.value.trim()){
    tasks.push(input.value.trim());
    input.value = '';
    renderTasks();
  }
};

function deleteTask(i){
  tasks.splice(i,1);
  renderTasks();
}

renderTasks();

// Calculator Logic
function append(val){
  document.getElementById('display').value += val;
}
function clearDisplay(){
  document.getElementById('display').value = '';
}
function deleteLast(){
  let val = document.getElementById('display').value;
  document.getElementById('display').value = val.slice(0,-1);
}
function calculate(){
  try{
    document.getElementById('display').value = eval(document.getElementById('display').value);
  } catch(e){
    document.getElementById('display').value = 'Error';
  }
}
</script>
</body>
</html>
